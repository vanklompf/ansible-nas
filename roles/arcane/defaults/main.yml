---
arcane_enabled: false
arcane_available_externally: false

# directories
arcane_data_directory: '{{ docker_home }}/arcane'

# network
arcane_port: '3552'
arcane_hostname: arcane

arcane_app_url: "{{ 'https://' + arcane_hostname + '.' + ansible_nas_domain if arcane_available_externally else 'http://localhost:' + arcane_port }}"
arcane_trusted_proxies: '172.16.0.0/12'

# specs
arcane_memory: 1g

# docker
arcane_container_name: arcane
arcane_image_name: ghcr.io/getarcaneapp/manager
arcane_image_version: latest
arcane_user_id: '1000'
arcane_group_id: '1000'

# Persisted on the host on first deploy. Optional inventory values seed the
# files once when migrating from config.
arcane_encryption_key_file: "{{ arcane_data_directory }}/.encryption_key"
arcane_jwt_secret_file: "{{ arcane_data_directory }}/.jwt_secret"
arcane_api_key_file: "{{ arcane_data_directory }}/.api_key"
arcane_encryption_key: ""

# --- OIDC / SSO (e.g. authentik) --------------------------------------------
arcane_oidc_enabled: false
# Client secret is auto-generated and persisted on the host.
arcane_oidc_client_secret_file: "{{ arcane_data_directory }}/.oidc_client_secret"
arcane_oidc_issuer_url: "{{ authentik_oidc_issuer_base }}/{{ arcane_hostname }}/"
# Send users straight to the provider instead of showing the local login form.
arcane_oidc_auto_login: false

# Homepage widget uses the host-persisted admin API key below.
# Local environment ID; 0 is the default manager environment.
arcane_homepage_widget_env: "0"
# Lower values sort first within the Homepage group (use negative to pin to top).
arcane_homepage_weight: "10"

# --- Remote environment agent (edge) ----------------------------------------
arcane_agent_enabled: false
arcane_agent_manager_url: "http://arcane.{{ ansible_nas_domain }}:3552"
arcane_agent_token: ''
arcane_agent_data_directory: '{{ docker_home }}/arcane-agent'
arcane_agent_memory: 1g
arcane_agent_container_name: arcane-agent
arcane_agent_image_name: ghcr.io/getarcaneapp/arcane-headless
arcane_agent_image_version: latest
