---
- name: Start Arcane
  block:
    - name: Create Arcane Directories
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        mode: '0755'
      loop:
        - '{{ arcane_data_directory }}'
        - '{{ arcane_data_directory }}/data'
        - '{{ arcane_data_directory }}/projects'

    - name: Ensure Arcane encryption key is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ arcane_encryption_key_file }}"
        _host_secret_generate_cmd: openssl rand -base64 32
        _host_secret_effective_var: arcane_encryption_key_effective
        _host_secret_container_name: "{{ arcane_container_name }}"
        _host_secret_container_env_key: ENCRYPTION_KEY
        _host_secret_seed_value: "{{ arcane_encryption_key }}"

    - name: Ensure Arcane JWT secret is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ arcane_jwt_secret_file }}"
        _host_secret_generate_cmd: openssl rand -base64 48
        _host_secret_effective_var: arcane_jwt_secret_effective
        _host_secret_container_name: "{{ arcane_container_name }}"
        _host_secret_container_env_key: JWT_SECRET
        _host_secret_seed_value: "{{ arcane_jwt_secret }}"

    - name: Ensure Arcane admin API key is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ arcane_api_key_file }}"
        _host_secret_generate_cmd: bash -c 'printf "arc_%s" "$(openssl rand -hex 32)"'
        _host_secret_effective_var: arcane_api_key_effective
        _host_secret_container_name: "{{ arcane_container_name }}"
        _host_secret_container_env_key: ADMIN_STATIC_API_KEY
        _host_secret_seed_value: "{{ arcane_api_key }}"

    - name: Create Arcane Docker Container
      community.docker.docker_container:
        container_default_behavior: no_defaults
        name: '{{ arcane_container_name }}'
        image: '{{ arcane_image_name }}:{{ arcane_image_version }}'
        pull: true
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - '{{ arcane_data_directory }}/data:/app/data:rw'
          - '{{ arcane_data_directory }}/projects:/app/data/projects:rw'
        ports: ['{{ arcane_port }}:3552']
        env:
          PUID: "{{ arcane_user_id }}"
          PGID: "{{ arcane_group_id }}"
          ENCRYPTION_KEY: "{{ arcane_encryption_key_effective }}"
          JWT_SECRET: "{{ arcane_jwt_secret_effective }}"
          ADMIN_STATIC_API_KEY: "{{ arcane_api_key_effective }}"
          APP_URL: "{{ arcane_app_url }}"
          TRUSTED_PROXIES: "{{ arcane_trusted_proxies }}"
          OIDC_ENABLED: "{{ 'true' if arcane_oidc_enabled | bool else 'false' }}"
          OIDC_CLIENT_ID: "{{ arcane_oidc_client_id if arcane_oidc_enabled | bool else omit }}"
          OIDC_CLIENT_SECRET: "{{ arcane_oidc_client_secret if arcane_oidc_enabled | bool else omit }}"
          OIDC_ISSUER_URL: "{{ arcane_oidc_issuer_url if arcane_oidc_enabled | bool else omit }}"
          OIDC_SCOPES: "{{ arcane_oidc_scopes if arcane_oidc_enabled | bool else omit }}"
          OIDC_GROUPS_CLAIM: "{{ arcane_oidc_groups_claim if arcane_oidc_enabled | bool else omit }}"
          OIDC_MERGE_ACCOUNTS: "{{ 'true' if arcane_oidc_enabled | bool else omit }}"
          OIDC_AUTO_REDIRECT_TO_PROVIDER: "{{ ('true' if arcane_oidc_auto_redirect | bool else 'false') if arcane_oidc_enabled | bool else omit }}"
          OIDC_PROVIDER_NAME: "{{ oidc_provider_name if arcane_oidc_enabled | bool else omit }}"
          OIDC_PROVIDER_LOGO_URL: "{{ oidc_provider_logo_url | default(omit) if arcane_oidc_enabled | bool else omit }}"
          OIDC_ROLE_MAPPINGS: "{{ arcane_oidc_role_mappings if arcane_oidc_enabled | bool else omit }}"
        restart_policy: unless-stopped
        memory: '{{ arcane_memory }}'
        labels:
          traefik.enable: '{{ arcane_available_externally | string }}'
          traefik.http.routers.arcane.rule: Host(`{{ arcane_hostname }}.{{ ansible_nas_domain}}`)
          traefik.http.routers.arcane.tls.certresolver: letsencrypt
          traefik.http.routers.arcane.tls.domains[0].main: '{{ ansible_nas_domain }}'
          traefik.http.routers.arcane.tls.domains[0].sans: '*.{{ ansible_nas_domain }}'
          traefik.http.services.arcane.loadbalancer.server.port: '3552'
          homepage.group: Monitoring
          homepage.weight: "{{ arcane_homepage_weight }}"
          homepage.name: Arcane
          homepage.icon: arcane
          homepage.href: "https://{{ arcane_hostname }}.{{ ansible_nas_domain }}"
          homepage.description: Docker monitoring
          homepage.widget.type: arcane
          homepage.widget.url: "http://{{ ansible_nas_hostname }}:{{ arcane_port }}"
          homepage.widget.env: "{{ arcane_homepage_widget_env }}"
          homepage.widget.key: "{{ arcane_api_key_effective }}"
        healthcheck:
          test:
            - CMD
            - curl
            - -fsS
            - http://localhost:3552/api/health
          interval: 10s
          timeout: 3s
          retries: 5
          start_period: 15s
  when: arcane_enabled is true
- name: Stop Arcane
  block:
    - name: Stop Arcane
      community.docker.docker_container:
        name: '{{ arcane_container_name }}'
        state: absent
  when: arcane_enabled is false

- name: Start Arcane Agent
  block:
    - name: Create Arcane Agent Directory
      ansible.builtin.file:
        path: '{{ arcane_agent_data_directory }}'
        state: directory
        mode: '0755'
    - name: Create Arcane Agent Docker Container
      community.docker.docker_container:
        container_default_behavior: no_defaults
        name: '{{ arcane_agent_container_name }}'
        image: '{{ arcane_agent_image_name }}:{{ arcane_agent_image_version }}'
        pull: true
        state: started
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - '{{ arcane_agent_data_directory }}:/app/data:rw'
        env:
          PUID: '{{ arcane_user_id }}'
          PGID: '{{ arcane_group_id }}'
          EDGE_AGENT: 'true'
          EDGE_TRANSPORT: poll
          AGENT_TOKEN: '{{ arcane_agent_token }}'
          MANAGER_API_URL: '{{ arcane_agent_manager_url }}'
        restart_policy: unless-stopped
        memory: '{{ arcane_agent_memory }}'
  when: arcane_agent_enabled is true

- name: Stop Arcane Agent
  block:
    - name: Stop Arcane Agent
      community.docker.docker_container:
        name: '{{ arcane_agent_container_name }}'
        state: absent
  when: arcane_agent_enabled is false
