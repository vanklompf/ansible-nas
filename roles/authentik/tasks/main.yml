---
- name: Start Authentik
  block:
    - name: Create Authentik mount directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ authentik_user_id }}"
        group: "{{ authentik_group_id }}"
        mode: 0755
      loop:
        - "{{ authentik_data_directory }}/database"
        - "{{ authentik_data_directory }}/media"
        - "{{ authentik_data_directory }}/custom-templates"
        - "{{ authentik_data_directory }}/certs"
        - "{{ authentik_blueprints_directory }}"

    - name: Create Authentik Redis data directory
      ansible.builtin.file:
        path: "{{ authentik_data_directory }}/redis"
        state: directory
        owner: "{{ authentik_redis_user_id }}"
        group: "{{ authentik_redis_group_id }}"
        mode: 0755

    - name: Ensure SSO admin password is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ sso_admin_password_file }}"
        _host_secret_generate_cmd: openssl rand -base64 24
        _host_secret_effective_var: sso_admin_password_effective
        _host_secret_seed_value: "{{ sso_admin_password }}"
      when: authentik_blueprint_sso_admin_enabled | bool

    - name: Deploy SSO admin authentik blueprint
      ansible.builtin.template:
        src: blueprints/sso-admin.yaml.j2
        dest: "{{ authentik_blueprints_directory }}/sso-admin.yaml"
        mode: "0644"
      when: authentik_blueprint_sso_admin_enabled | bool

    - name: Remove SSO admin authentik blueprint
      ansible.builtin.file:
        path: "{{ authentik_blueprints_directory }}/sso-admin.yaml"
        state: absent
      when: not authentik_blueprint_sso_admin_enabled | bool

    - name: Deploy Arcane OIDC authentik blueprint
      ansible.builtin.template:
        src: blueprints/arcane.yaml.j2
        dest: "{{ authentik_blueprints_directory }}/arcane.yaml"
        mode: "0644"
      when: authentik_blueprint_arcane_enabled | bool

    - name: Remove Arcane OIDC authentik blueprint
      ansible.builtin.file:
        path: "{{ authentik_blueprints_directory }}/arcane.yaml"
        state: absent
      when: not authentik_blueprint_arcane_enabled | bool

    - name: Ensure Homepage API key is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ authentik_homepage_api_key_file }}"
        _host_secret_generate_cmd: bash -c 'openssl rand -hex 32'
        _host_secret_effective_var: authentik_homepage_api_key_effective
        _host_secret_seed_value: "{{ authentik_homepage_api_key }}"
      when: authentik_blueprint_homepage_api_enabled | bool

    - name: Sanitize Homepage API key whitespace
      ansible.builtin.set_fact:
        authentik_homepage_api_key_effective: "{{ authentik_homepage_api_key_effective | replace('\n', '') | replace('\r', '') | trim }}"
      no_log: true
      when: authentik_blueprint_homepage_api_enabled | bool

    - name: Persist sanitized Homepage API key
      ansible.builtin.copy:
        content: "{{ authentik_homepage_api_key_effective }}\n"
        dest: "{{ authentik_homepage_api_key_file }}"
        mode: "0600"
      no_log: true
      when: authentik_blueprint_homepage_api_enabled | bool

    - name: Deploy Homepage API authentik blueprint
      ansible.builtin.template:
        src: blueprints/homepage-api.yaml.j2
        dest: "{{ authentik_blueprints_directory }}/homepage-api.yaml"
        mode: "0644"
      when: authentik_blueprint_homepage_api_enabled | bool

    - name: Remove Homepage API authentik blueprint
      ansible.builtin.file:
        path: "{{ authentik_blueprints_directory }}/homepage-api.yaml"
        state: absent
      when: not authentik_blueprint_homepage_api_enabled | bool

    - name: Create Authentik network
      community.docker.docker_network:
        name: "{{ authentik_network_name }}"

    - name: Ensure Authentik secret key is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ authentik_secret_key_file }}"
        _host_secret_generate_cmd: openssl rand -base64 50
        _host_secret_effective_var: authentik_secret_key_effective
        _host_secret_container_name: "{{ authentik_server_container_name }}"
        _host_secret_container_env_key: AUTHENTIK_SECRET_KEY
        _host_secret_seed_value: "{{ authentik_secret_key }}"

    - name: Ensure Authentik database password is persisted on host
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_host_secret.yml"
      vars:
        _host_secret_file: "{{ authentik_pg_pass_file }}"
        _host_secret_generate_cmd: openssl rand -base64 36
        _host_secret_effective_var: authentik_pg_pass_effective
        _host_secret_container_name: "{{ authentik_database_container_name }}"
        _host_secret_container_env_key: POSTGRES_PASSWORD
        _host_secret_seed_value: "{{ authentik_pg_pass }}"
        _host_secret_default_placeholder: password

    - name: Authentik Database Docker Container
      community.docker.docker_container:
        name: "{{ authentik_database_container_name }}"
        image: "{{ authentik_database_image_name }}:{{ authentik_database_image_tag }}"
        pull: true
        volumes:
          - "{{ authentik_data_directory }}/database:/var/lib/postgresql/data:rw"
        networks:
          - name: "{{ authentik_network_name }}"
        env:
          POSTGRES_PASSWORD: "{{ authentik_pg_pass_effective }}"
          POSTGRES_USER: "{{ authentik_pg_user }}"
          POSTGRES_DB: "{{ authentik_pg_db }}"
        labels:
          traefik.enable: "false"
        restart_policy: unless-stopped
        memory: "{{ authentik_database_memory }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -d {{ authentik_pg_db }} -U {{ authentik_pg_user }}"]
          start_period: 20s
          interval: 30s
          retries: 5
          timeout: 5s

    - name: Authentik Redis Docker Container
      community.docker.docker_container:
        name: "{{ authentik_redis_container_name }}"
        image: "{{ authentik_redis_image_name }}:{{ authentik_redis_image_tag }}"
        pull: true
        command: --save 60 1 --loglevel warning
        volumes:
          - "{{ authentik_data_directory }}/redis:/data:rw"
        networks:
          - name: "{{ authentik_network_name }}"
        labels:
          traefik.enable: "false"
        restart_policy: unless-stopped
        memory: "{{ authentik_redis_memory }}"
        healthcheck:
          test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
          start_period: 20s
          interval: 30s
          retries: 5
          timeout: 3s

    - name: Authentik Server Docker Container
      vars:
        _authentik_base_labels:
          traefik.enable: "{{ authentik_available_externally | string }}"
          traefik.http.routers.authentik.rule: "Host(`{{ authentik_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.authentik.tls.certresolver: "letsencrypt"
          traefik.http.routers.authentik.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.authentik.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.authentik.loadbalancer.server.port: "9000"
        _authentik_allowlist_labels:
          traefik.http.middlewares.authentik-allowlist.IPAllowList.ipstrategy.depth: "1"
          traefik.http.middlewares.authentik-allowlist.IPAllowList.sourcerange: "{{ authentik_ip_allowlist_sourcerange }}"
          traefik.http.routers.authentik.middlewares: "authentik-allowlist"
        _authentik_homepage_labels:
          homepage.group: Networking
          homepage.weight: "{{ authentik_homepage_weight }}"
          homepage.name: Authentik
          homepage.icon: authentik.png
          homepage.href: "{{ 'https://' + authentik_hostname + '.' + ansible_nas_domain if authentik_available_externally | bool else 'http://' + ansible_nas_hostname + ':' + authentik_http_port }}"
          homepage.description: Identity Provider
        _authentik_homepage_widget_key: "{{ authentik_homepage_api_key_effective | default(authentik_homepage_api_key, true) }}"
        _authentik_homepage_widget_labels:
          homepage.widget.type: authentik
          homepage.widget.url: "http://{{ ansible_nas_hostname }}:{{ authentik_http_port }}"
          homepage.widget.key: "{{ _authentik_homepage_widget_key }}"
          homepage.widget.version: "{{ authentik_homepage_widget_version }}"
      community.docker.docker_container:
        name: "{{ authentik_server_container_name }}"
        image: "{{ authentik_server_image_name }}:{{ authentik_server_image_tag }}"
        pull: true
        command: server
        volumes:
          - "{{ authentik_data_directory }}/media:/media:rw"
          - "{{ authentik_data_directory }}/custom-templates:/templates:rw"
        ports:
          - "{{ authentik_http_port }}:9000"
          - "{{ authentik_https_port }}:9443"
        networks:
          - name: "{{ authentik_network_name }}"
        env:
          AUTHENTIK_REDIS__HOST: "{{ authentik_redis_container_name }}"
          AUTHENTIK_POSTGRESQL__HOST: "{{ authentik_database_container_name }}"
          AUTHENTIK_POSTGRESQL__USER: "{{ authentik_pg_user }}"
          AUTHENTIK_POSTGRESQL__NAME: "{{ authentik_pg_db }}"
          AUTHENTIK_POSTGRESQL__PASSWORD: "{{ authentik_pg_pass_effective }}"
          AUTHENTIK_ERROR_REPORTING__ENABLED: "{{ authentik_error_reporting | string }}"
          # SMTP Host Emails are sent to
          AUTHENTIK_EMAIL__HOST: "{{ authentik_email_host }}"
          AUTHENTIK_EMAIL__PORT: "{{ authentik_email_port }}"
          # Optionally authenticate (don't add quotation marks to you password)
          AUTHENTIK_EMAIL__USERNAME: "{{ authentik_email_username }}"
          AUTHENTIK_EMAIL__PASSWORD: "{{ authentik_email_password }}"
          # Use StartTLS
          AUTHENTIK_EMAIL__USE_TLS: "{{ authentik_email_use_tls }}"
          # Use SSL
          AUTHENTIK_EMAIL__USE_SSL: "{{ authentik_email_use_ssl }}"
          AUTHENTIK_EMAIL__TIMEOUT: "{{ authentik_email_timeout }}"
          # Email address authentik will send from, should have a correct @domain
          AUTHENTIK_EMAIL__FROM: "{{ authentik_email_from }}"
          # WORKERS: 2
          AUTHENTIK_SECRET_KEY: "{{ authentik_secret_key_effective }}"
          AUTHENTIK_DISABLE_UPDATE_CHECK: "{{ authentik_disable_update_check | string }}"
          AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "{{ authentik_disable_startup_analytics | string }}"
          AUTHENTIK_AVATARS: "{{ authentik_avatars }}"
        labels: >-
          {{
            _authentik_base_labels
            | combine(_authentik_allowlist_labels if authentik_ip_allowlist_enabled | bool else {})
            | combine(_authentik_homepage_labels)
            | combine(_authentik_homepage_widget_labels if _authentik_homepage_widget_key | length > 0 else {})
          }}
        restart_policy: unless-stopped
        memory: "{{ authentik_server_memory }}"

    - name: Authentik Worker Docker Container
      community.docker.docker_container:
        name: "{{ authentik_worker_container_name }}"
        image: "{{ authentik_worker_image_name }}:{{ authentik_worker_image_tag }}"
        pull: true
        command: worker
        volumes:
          - "{{ authentik_data_directory }}/certs:/certs:rw"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
          - "{{ authentik_data_directory }}/media:/media:rw"
          - "{{ authentik_data_directory }}/custom-templates:/templates:rw"
          - "{{ authentik_blueprints_directory }}:/blueprints/managed:rw"
        networks:
          - name: "{{ authentik_network_name }}"
        env:
          AUTHENTIK_REDIS__HOST: "{{ authentik_redis_container_name }}"
          AUTHENTIK_POSTGRESQL__HOST: "{{ authentik_database_container_name }}"
          AUTHENTIK_POSTGRESQL__USER: "{{ authentik_pg_user }}"
          AUTHENTIK_POSTGRESQL__NAME: "{{ authentik_pg_db }}"
          AUTHENTIK_POSTGRESQL__PASSWORD: "{{ authentik_pg_pass_effective }}"
          AUTHENTIK_ERROR_REPORTING__ENABLED: "{{ authentik_error_reporting | string }}"
          # SMTP Host Emails are sent to
          AUTHENTIK_EMAIL__HOST: "{{ authentik_email_host }}"
          AUTHENTIK_EMAIL__PORT: "{{ authentik_email_port }}"
          # Optionally authenticate (don't add quotation marks to you password)
          AUTHENTIK_EMAIL__USERNAME: "{{ authentik_email_username }}"
          AUTHENTIK_EMAIL__PASSWORD: "{{ authentik_email_password }}"
          # Use StartTLS
          AUTHENTIK_EMAIL__USE_TLS: "{{ authentik_email_use_tls }}"
          # Use SSL
          AUTHENTIK_EMAIL__USE_SSL: "{{ authentik_email_use_ssl }}"
          AUTHENTIK_EMAIL__TIMEOUT: "{{ authentik_email_timeout }}"
          # Email address authentik will send from, should have a correct @domain
          AUTHENTIK_EMAIL__FROM: "{{ authentik_email_from }}"
          # WORKERS: 2
          AUTHENTIK_SECRET_KEY: "{{ authentik_secret_key_effective }}"
        # `user: root` and the docker socket volume are optional.
        # See more for the docker socket integration here:
        # https://goauthentik.io/docs/outposts/integrations/docker
        # Removing `user: root` also prevents the worker from fixing the permissions
        # on the mounted folders, so when removing this make sure the folders have the correct UID/GID
        # (1000:1000 by default)
        user: root
        labels:
          traefik.enable: "false"
        restart_policy: unless-stopped
        memory: "{{ authentik_worker_memory }}"

    - name: Apply SSO admin authentik blueprint
      community.docker.docker_container_exec:
        container: "{{ authentik_worker_container_name }}"
        command: ak apply_blueprint /blueprints/managed/sso-admin.yaml
      register: authentik_blueprint_sso_admin_apply
      changed_when: authentik_blueprint_sso_admin_apply.rc == 0
      when: authentik_blueprint_sso_admin_enabled | bool

    - name: Apply Arcane OIDC authentik blueprint
      community.docker.docker_container_exec:
        container: "{{ authentik_worker_container_name }}"
        command: ak apply_blueprint /blueprints/managed/arcane.yaml
      register: authentik_blueprint_arcane_apply
      changed_when: authentik_blueprint_arcane_apply.rc == 0
      when: authentik_blueprint_arcane_enabled | bool

    - name: Apply Homepage API authentik blueprint
      community.docker.docker_container_exec:
        container: "{{ authentik_worker_container_name }}"
        command: ak apply_blueprint /blueprints/managed/homepage-api.yaml
      register: authentik_blueprint_homepage_api_apply
      changed_when: authentik_blueprint_homepage_api_apply.rc == 0
      when: authentik_blueprint_homepage_api_enabled | bool
  when: authentik_enabled is true

- name: Stop Authentik
  block:
    - name: Stop Authentik Database
      community.docker.docker_container:
        name: "{{ authentik_database_container_name }}"
        state: absent

    - name: Stop Authentik Redis
      community.docker.docker_container:
        name: "{{ authentik_redis_container_name }}"
        state: absent

    - name: Stop Authentik Server
      community.docker.docker_container:
        name: "{{ authentik_server_container_name }}"
        state: absent

    - name: Stop Authentik Worker
      community.docker.docker_container:
        name: "{{ authentik_worker_container_name }}"
        state: absent
  when: authentik_enabled is false
