---
- name: Reload systemd after cups.socket drop-in change
  ansible.builtin.systemd:
    daemon_reload: true
  listen: restart cups after socket override

- name: Stop CUPS before socket restart
  ansible.builtin.service:
    name: cups
    state: stopped
  listen: restart cups after socket override

- name: Reset cups.socket failed state
  ansible.builtin.command:
    cmd: systemctl reset-failed cups.socket
  changed_when: false
  failed_when: false
  listen: restart cups after socket override

- name: Restart cups.socket for new ListenStream bindings
  ansible.builtin.systemd:
    name: cups.socket
    state: restarted
  listen: restart cups after socket override

- name: Start CUPS after socket change
  ansible.builtin.service:
    name: cups
    state: started
  listen: restart cups after socket override

- name: Restart CUPS
  ansible.builtin.service:
    name: cups
    state: restarted
  listen: restart cups

- name: Reload Avahi
  ansible.builtin.service:
    name: avahi-daemon
    state: reloaded
  listen: reload avahi
