---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Include vars
      ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get grampsweb redis container state
      community.docker.docker_container_info:
        name: "{{ grampsweb_redis_container_name }}"
      register: result_redis

    - name: Get grampsweb container state
      community.docker.docker_container_info:
        name: "{{ grampsweb_container_name }}"
      register: result

    - name: Get grampsweb celery container state
      community.docker.docker_container_info:
        name: "{{ grampsweb_celery_container_name }}"
      register: result_celery

    - name: Check if grampsweb containers are running
      ansible.builtin.assert:
        that:
          - result_redis.exists
          - result_redis.container['State']['Status'] == "running"
          - result_redis.container['State']['Restarting'] == false
          - result.exists
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_celery.exists
          - result_celery.container['State']['Status'] == "running"
          - result_celery.container['State']['Restarting'] == false
