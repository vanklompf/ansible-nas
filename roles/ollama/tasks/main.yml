---
- name: Start Ollama
  block:
    - name: Create Ollama directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      with_items:
        - "{{ ollama_data_directory }}/backend"

    - name: Create Ollama network
      community.docker.docker_network:
        name: "{{ ollama_network_name }}"

    - name: Ollama Docker Container
      community.docker.docker_container:
        name: "{{ ollama_container_name }}"
        image: "{{ ollama_image_name }}:{{ ollama_image_version }}"
        volumes:
          - "{{ ollama_data_directory }}:/root/.ollama"
        ports:
          - "{{ ollama_port }}:11434"
        networks:
          - name: "{{ ollama_network_name }}"
        pull: true
        restart_policy: unless-stopped
        memory: "{{ ollama_memory }}"

    - name: Wait for Ollama API
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ ollama_port }}/api/tags"
        method: GET
      register: ollama_api
      until: ollama_api.status == 200
      retries: 30
      delay: 2
      changed_when: false
      when: ollama_models_pull | length > 0

    - name: Pull Ollama models
      community.docker.docker_container_exec:
        container: "{{ ollama_container_name }}"
        command: "ollama pull {{ item }}"
      loop: "{{ ollama_models_pull }}"
      when: >
        ollama_models_pull | length > 0 and
        (ollama_api.json.models | default([]) | map(attribute='name') | list |
         select('equalto', item) | list | length == 0) and
        (ollama_api.json.models | default([]) | map(attribute='name') | list |
         select('match', '^' ~ (item | regex_escape) ~ ':') | list | length == 0)
      register: ollama_model_pull
      changed_when: "'pulling' in ollama_model_pull.stdout | lower"

    - name: Ollama WebUI Docker Container
      community.docker.docker_container:
        name: "{{ ollama_webui_container_name }}"
        image: "{{ ollama_webui_image_name }}:{{ ollama_webui_image_version }}"
        volumes:
          - "{{ ollama_data_directory }}/backend:/app/backend/data"
        networks:
          - name: "{{ ollama_network_name }}"
        ports:
          - "{{ ollama_webui_port }}:8080"
        env:
          OLLAMA_BASE_URL: "http://{{ ollama_container_name }}:11434"
        pull: true
        restart_policy: unless-stopped
        memory: "{{ ollama_webui_memory }}"
        labels:
          traefik.enable: "{{ ollama_available_externally | string }}"
          traefik.http.routers.ollama_webui.rule: "Host(`{{ ollama_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ollama_webui.tls.certresolver: "letsencrypt"
          traefik.http.routers.ollama_webui.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ollama_webui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.ollama_webui.loadbalancer.server.port: "8080"
          homepage.group: Applications
          homepage.weight: "90"
          homepage.name: Ollama
          homepage.icon: ollama
          homepage.href: "https://{{ ollama_hostname }}.{{ ansible_nas_domain }}"
          homepage.description: Large language models
  when: ollama_enabled is true

- name: Stop Ollama
  block:
    - name: Stop Ollama
      community.docker.docker_container:
        name: "{{ ollama_container_name }}"
        state: absent
    - name: Stop Ollama Webui
      community.docker.docker_container:
        name: "{{ ollama_webui_container_name }}"
        state: absent
    - name: Remove Ollama network
      community.docker.docker_network:
        name: "{{ ollama_network_name }}"
        state: absent

  when: ollama_enabled is false
