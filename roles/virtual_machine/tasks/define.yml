---
- name: Render domain XML
  ansible.builtin.template:
    src: domain.xml.j2
    dest: "{{ vm_storage_dir }}/domain.xml"
    mode: "0640"
  register: vm_domain_xml

- name: Read rendered domain XML
  ansible.builtin.slurp:
    src: "{{ vm_storage_dir }}/domain.xml"
  register: vm_domain_xml_blob

- name: List defined libvirt domains
  community.libvirt.virt:
    command: list_vms
  register: vm_defined_domains
  changed_when: false

- name: Define libvirt domain
  community.libvirt.virt:
    command: define
    xml: "{{ vm_domain_xml_blob.content | b64decode }}"
  when: vm_domain_xml.changed or (vm_name not in (vm_defined_domains.list_vms | default([])))

- name: Set libvirt domain autostart
  community.libvirt.virt:
    name: "{{ vm_name }}"
    autostart: "{{ vm_autostart | bool }}"

- name: Start libvirt domain
  community.libvirt.virt:
    name: "{{ vm_name }}"
    state: running

- name: Wait for the guest to become ready (QEMU guest agent)
  ansible.builtin.command:
    cmd: "virsh qemu-agent-command {{ vm_name }} '{\"execute\":\"guest-ping\"}'"
  register: vm_boot_agent_ping
  until: vm_boot_agent_ping.rc == 0
  retries: "{{ ((vm_wait_for_boot_timeout | int) / 5) | round(0, 'ceil') | int }}"
  delay: 5
  changed_when: false
  when: vm_wait_for_boot | bool
