---
# The per-VM disk is a qcow2 overlay backed by this cached image. If the
# cache file is overwritten in place (e.g. upstream re-spins the release
# image and get_url re-downloads it), every existing overlay that references
# it is silently corrupted. To prevent that we content-address the cache
# filename by the resolved checksum, so a changed upstream image lands as a
# new file and never mutates a backing image an existing overlay depends on.
- name: Split base image checksum into algorithm and source
  ansible.builtin.set_fact:
    vm_image_checksum_algo: "{{ vm_image_checksum.split(':', 1)[0] }}"
    vm_image_checksum_source: "{{ vm_image_checksum.split(':', 1)[1] }}"

- name: Resolve base image checksum from upstream checksum file
  when: vm_image_checksum_source is match('^https?://')
  block:
    - name: Fetch upstream checksum file
      ansible.builtin.uri:
        url: "{{ vm_image_checksum_source }}"
        return_content: true
      register: vm_image_checksum_download

    - name: Extract checksum for the base image
      ansible.builtin.set_fact:
        vm_image_checksum_value: "{{ (vm_image_checksum_download.content.splitlines() | select('search', '[ *]' ~ (vm_image_url | basename | regex_escape) ~ '$') | first).split()[0] }}"

- name: Use literal base image checksum
  ansible.builtin.set_fact:
    vm_image_checksum_value: "{{ vm_image_checksum_source }}"
  when: vm_image_checksum_source is not match('^https?://')

- name: Build content-addressed cache filename for the base image
  ansible.builtin.set_fact:
    vm_image_cache_filename: "{{ vm_image_url | basename | regex_replace('(\\.[^.]*)$', '-' ~ (vm_image_checksum_value[:16]) ~ '\\1') }}"

- name: Cache base cloud image
  ansible.builtin.get_url:
    url: "{{ vm_image_url }}"
    dest: "{{ vm_image_cache_dir }}/{{ vm_image_cache_filename }}"
    checksum: "{{ vm_image_checksum_algo }}:{{ vm_image_checksum_value }}"
    mode: "0644"
  register: vm_base_image

- name: Stat per-VM root disk
  ansible.builtin.stat:
    path: "{{ vm_disk_path }}"
  register: vm_disk_stat

- name: Create per-VM root disk backed by the cached cloud image
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2
      -F qcow2
      -b {{ vm_image_cache_dir }}/{{ vm_image_cache_filename }}
      {{ vm_disk_path }}
      {{ vm_disk_gb }}G
  when: not vm_disk_stat.stat.exists

- name: Inspect per-VM root disk size
  ansible.builtin.command:
    cmd: "qemu-img info --output=json {{ vm_disk_path }}"
  register: vm_disk_info
  changed_when: false
  when: vm_disk_stat.stat.exists

- name: Resize per-VM root disk if vm_disk_gb has grown
  ansible.builtin.command:
    cmd: "qemu-img resize {{ vm_disk_path }} {{ vm_disk_gb }}G"
  when:
    - vm_disk_stat.stat.exists
    - (vm_disk_info.stdout | from_json)['virtual-size'] | int < (vm_disk_gb | int * 1024 * 1024 * 1024)

- name: Set disk file ownership for libvirt-qemu
  ansible.builtin.file:
    path: "{{ vm_disk_path }}"
    owner: libvirt-qemu
    group: kvm
    mode: "0660"
  failed_when: false
