---
# Generate or migrate a secret into a host-local file, then expose it as a fact.
#
# Required vars:
#   _host_secret_file           - absolute path for the secret file
#   _host_secret_generate_cmd   - command that prints a new secret to stdout
#   _host_secret_effective_var  - fact name to set (e.g. immich_jwt_secret_effective)
#
# Optional vars:
#   _host_secret_container_name     - migrate from a running container on first deploy
#   _host_secret_container_env_key  - env var name inside that container
#   _host_secret_seed_value         - inventory value used once when the file is missing
#   _host_secret_default_placeholder - skip seeding when seed equals this default

- name: "Check if host secret file exists ({{ _host_secret_file }})"
  ansible.builtin.stat:
    path: "{{ _host_secret_file }}"
  register: _host_secret_file_stat

- name: "Initialize host secret on first deploy ({{ _host_secret_file }})"
  when: not _host_secret_file_stat.stat.exists
  block:
    # set_fact persists as a host fact for the rest of the play (not just this
    # include), so without an explicit reset here, a value left over from a
    # previous secret (e.g. another ensure_host_secret.yml call earlier in the
    # same play) would be mistaken for an already-resolved value below and
    # copied into this secret's file instead of generating a new one.
    - name: Reset working value for this secret
      ansible.builtin.set_fact:
        _host_secret_new_value: ""
      no_log: true

    - name: "Read existing secret from container {{ _host_secret_container_name | default('') }}"
      community.docker.docker_container_info:
        name: "{{ _host_secret_container_name }}"
      register: _host_secret_container_info
      failed_when: false
      no_log: true
      when: _host_secret_container_name | default('') | length > 0

    - name: Extract secret from container environment
      ansible.builtin.set_fact:
        _host_secret_new_value: >-
          {{
            (_host_secret_container_info.container.Config.Env | default([])
            | select('match', '^' + _host_secret_container_env_key + '=')
            | first | default('') | regex_replace('^[^=]+=', ''))
          }}
      no_log: true
      when:
        - _host_secret_container_name | default('') | length > 0
        - _host_secret_container_info.exists | default(false)
        - _host_secret_container_env_key | default('') | length > 0

    - name: Use inventory seed for host secret
      ansible.builtin.set_fact:
        _host_secret_new_value: "{{ _host_secret_seed_value }}"
      no_log: true
      when:
        - _host_secret_new_value | default('') | length == 0
        - _host_secret_seed_value | default('') | length > 0
        - _host_secret_default_placeholder | default('') | length == 0
          or _host_secret_seed_value != _host_secret_default_placeholder

    - name: Generate new host secret
      ansible.builtin.command: "{{ _host_secret_generate_cmd }}"
      register: _host_secret_generated
      changed_when: true
      no_log: true
      when: _host_secret_new_value | default('') | length == 0

    - name: Set generated host secret value
      ansible.builtin.set_fact:
        _host_secret_new_value: "{{ _host_secret_generated.stdout }}"
      no_log: true
      when: _host_secret_new_value | default('') | length == 0

    - name: Persist host secret file
      ansible.builtin.copy:
        content: "{{ _host_secret_new_value | trim }}\n"
        dest: "{{ _host_secret_file }}"
        mode: "0600"
      no_log: true

- name: "Read host secret file ({{ _host_secret_file }})"
  ansible.builtin.slurp:
    src: "{{ _host_secret_file }}"
  register: _host_secret_file_content
  no_log: true

- name: "Set effective host secret fact ({{ _host_secret_effective_var }})"
  ansible.builtin.set_fact:
    "{{ _host_secret_effective_var }}": "{{ _host_secret_file_content.content | b64decode | trim }}"
  no_log: true
